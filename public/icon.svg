<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="creature" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Hexagon background -->
  <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="url(#bg)" stroke="#6366F1" stroke-width="3"/>
  
  <!-- Creature silhouette: rounded body with ears and tail -->
  <g transform="translate(0, 3)">
    <!-- Tail -->
    <path d="M62 58 Q72 52 70 44 Q68 38 60 45" fill="url(#creature)" stroke="#D97706" stroke-width="1.5"/>
    
    <!-- Body -->
    <ellipse cx="50" cy="55" rx="18" ry="16" fill="url(#creature)" stroke="#D97706" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="42" cy="42" r="14" fill="url(#creature)" stroke="#D97706" stroke-width="1.5"/>
    
    <!-- Left ear -->
    <path d="M31 35 L24 20 Q28 18 34 25 Z" fill="url(#creature)" stroke="#D97706" stroke-width="1.5"/>
    <!-- Right ear -->
    <path d="M53 35 L60 20 Q56 18 50 25 Z" fill="url(#creature)" stroke="#D97706" stroke-width="1.5"/>
    
    <!-- Eye -->
    <circle cx="45" cy="40" r="3.5" fill="#1F2937"/>
    <circle cx="46.2" cy="38.8" r="1.2" fill="white"/>
    
    <!-- Small smile -->
    <path d="M43 48 Q46 50 49 48" fill="none" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>